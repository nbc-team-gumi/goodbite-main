<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GOOD BITE - 가게 등록</title>
  <style>
    body {
      font-family: 'Nanum Gothic', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background-color: #ff9800;
      color: white;
      padding: 10px 0;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    form {
      background-color: white;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="password"],
    input[type="tel"],
    input[type="email"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .submit-btn {
      background-color: #ff9800;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    .submit-btn:hover {
      background-color: #f57c00;
    }
  </style>
</head>
<body>
<header>
  <h1>GOOD BITE - 가게 수정</h1>
</header>
<div class="container">
  <form id="store-register-form">
    <div class="form-group">
      <label for="store-name">가게 이름</label>
      <input id="store-name" name="store-name" required="" type="text">
    </div>
    <div class="form-group">
      <label for="store-area">지역</label>
      <input id="store-area" name="store-area" required="" type="text">
    </div>
    <div class="form-group">
      <label for="store-address">가게 주소</label>
      <input id="store-address" name="store-address" required="" type="text">
    </div>
    <div class="form-group">
      <label for="store-phonenumber">가게 전화번호</label>
      <input id="store-phonenumber" name="store-phonenumber" required="" type="text">
    </div>
    <div class="form-group">
      <label for="store-category">분류</label>
      <input id="store-category" name="store-category" required="" type="text">
    </div>
    <div class="form-group">
      <label for="store-photo">가게 사진</label>
      <input accept="image/*" id="store-photo" multiple="" name="store-photo" type="file">
      <div id="image-preview"></div>
    </div>
    <button class="submit-btn" type="submit">수정하기</button>
  </form>
</div>

<script>
  document.getElementById('store-register-form').addEventListener('submit', function (e) {
    e.preventDefault();

    // 여기에 폼 유효성 검사 및 서버로 데이터 전송 로직을 추가할 수 있습니다.
    alert('가게 등록이 완료되었습니다!');
    // 실제 구현에서는 서버로 데이터를 전송하고 응답을 처리해야 합니다.
  });

  // 이미지 미리보기 기능
  document.getElementById('store-photo').addEventListener('change', function (e) {
    const imagePreview = document.getElementById('image-preview');
    imagePreview.innerHTML = ''; // 기존 미리보기 초기화

    for (let i = 0; i < e.target.files.length; i++) {
      const file = e.target.files[i];
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.file = file;
        img.style.maxWidth = '100px';
        img.style.maxHeight = '100px';
        img.style.margin = '5px';
        imagePreview.appendChild(img);

        const reader = new FileReader();
        reader.onload = (function (aImg) {
          return function (e) {
            aImg.src = e.target.result;
          };
        })(img);
        reader.readAsDataURL(file);
      }
    }
  });
</script>
</body>
</html>
